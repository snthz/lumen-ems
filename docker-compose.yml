services:
  app:
    build: .
    image: lumen-ems:latest
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://lumen:lumen@db:5432/lumen_ems
      - DATA_DIR=/data
      - TB_API=https://dashboard.lumenenergysolutions.com
      - NEXT_PUBLIC_TB_API=https://dashboard.lumenenergysolutions.com
      - EMS_INDUSTRIES_GROUP_ID=uuid-del-grupo-industria
      - EMS_BILLING_GROUP_ID=uuid-del-grupo-facturacion
      - EMS_MULTISITE_GROUP_ID=uuid-del-grupo-multisitio
    volumes:
      - app-data:/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: lumen
      POSTGRES_PASSWORD: lumen
      POSTGRES_DB: lumen_ems
    volumes:
      - pg-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumen -d lumen_ems"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pg-data:
  app-data:
